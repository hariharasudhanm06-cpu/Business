<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            width: 250px;
            margin: 20px 0;
        }
        .amount {
            font-size: 24px;
            font-weight: bold;
            color: green;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 18px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Payment</h2>
        <p>Please scan the QR code and pay the amount.</p>

        <p class="amount">₹{{ total_price }}</p>

        <img src="{{ url_for('static', filename='qr.png') }}" alt="QR Code">

        <p>After payment, send screenshot in WhatsApp / confirm manually.</p>

        <a href="/" class="btn">Back to Home</a>
    </div>
</body>
</html>
